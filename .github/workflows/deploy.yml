name: deploy
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Не отменяем идущий деплой новым пушем: prod-job может ждать ручного аппрува.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # версия из package.json → packageManager
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build
        run: SKIP_ENV_VALIDATION=1 SKIP_LINT=1 pnpm build
      - name: Lint
        run: npx eslint . --no-cache # next lint флейкает на сортировке импортов; прямой eslint без кэша стабилен
      - name: Typecheck
        run: pnpm typecheck
      - name: Dangling exports
        run: pnpm check:exports

  deploy-test:
    needs: ci
    runs-on: ubuntu-latest
    environment: test
    steps:
      - uses: actions/checkout@v4
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}
      - name: Add host to known_hosts
        run: ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts
      - name: Rsync sources
        run: |
          rsync -az --delete \
            --exclude='.git' --exclude='node_modules' --exclude='.next' --exclude='.env' \
            ./ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH_TEST }}/
      - name: Build & up
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "cd ${{ secrets.DEPLOY_PATH_TEST }} && docker compose build && docker compose up -d \
             && docker image prune -f && docker builder prune -f --filter until=168h"

  deploy-prod:
    needs: [ci, deploy-test]
    runs-on: ubuntu-latest
    environment: production # required reviewers → job ждёт ручного аппрува в Actions
    steps:
      - uses: actions/checkout@v4
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}
      - name: Add host to known_hosts
        run: ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts
      - name: Rsync sources
        run: |
          rsync -az --delete \
            --exclude='.git' --exclude='node_modules' --exclude='.next' --exclude='.env' \
            ./ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH_PROD }}/
      - name: Build & up
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "cd ${{ secrets.DEPLOY_PATH_PROD }} && docker compose build && docker compose up -d \
             && docker image prune -f && docker builder prune -f --filter until=168h"
